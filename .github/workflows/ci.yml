name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: ${{ matrix.os }} / go ${{ matrix.go-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go-version: ['1.26']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Gofmt
        if: matrix.os == 'ubuntu-latest'
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files need gofmt:"
            echo "$unformatted"
            exit 1
          fi

      # Race detector requires cgo and a C toolchain; run it on Linux only.
      # The other matrix OSes still run the full suite without -race.
      - name: Test (race)
        if: matrix.os == 'ubuntu-latest'
        run: go test ./... -race -count=1

      - name: Test
        if: matrix.os != 'ubuntu-latest'
        run: go test ./... -count=1

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      # Install golangci-lint v2 via `go install` so it is built with the
      # runner's Go (1.26). The official v1.x release binaries are built with
      # go1.24 and refuse a go.mod targeting 1.26 ("language version used to
      # build golangci-lint is lower than the targeted Go version"); v1 is also
      # EOL. .golangci.yml uses the v2 config schema. Pinned for reproducibility.
      - name: Install golangci-lint v2
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
      - name: Lint
        run: golangci-lint run ./...
