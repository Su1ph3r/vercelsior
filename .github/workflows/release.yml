name: Release

# Pushes a full release when a tag matching v* is pushed:
#   - cross-platform binaries + archives + checksums (GitHub Release assets)
#   - CycloneDX SBOMs
#   - multi-arch Docker image -> ghcr.io/su1ph3r/vercelsior
#   - Homebrew formula -> Su1ph3r/homebrew-tap   (stable tags only)
#   - Scoop manifest    -> Su1ph3r/scoop-bucket  (stable tags only)
#
# Setup before first use:
#   1. (Optional, for taps) Create repos Su1ph3r/homebrew-tap and
#      Su1ph3r/scoop-bucket, plus a PAT with `repo` scope stored as the
#      HOMEBREW_TAP_GITHUB_TOKEN secret. Without it, the brew/scoop steps are
#      skipped — binaries, archives, and the Docker image still publish.
#   2. Tag + push:  git tag v1.0.0 && git push origin v1.0.0
#
# GHCR needs no extra secret — the workflow uses the built-in GITHUB_TOKEN
# with packages:write.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Syft (SBOM)
        uses: anchore/sbom-action/download-syft@v0

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional: enables Homebrew/Scoop publishing. If unset, those
          # publishers no-op rather than failing the release.
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
